apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  name: www-secret
spec:
  encryptedData:
    ELASTICSEARCH_URL: 
    ELASTICSEARCH_USER: 
    ELASTICSEARCH_PASSWORD: 
    OAUTH_CLIENT_ID: 
    OAUTH_CLIENT_SECRET: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      name: www-secret
    type: Opaque
