# SonarCloud configuration

# Exclude test files from duplication detection
sonar.cpd.exclusions=**/__tests__/**/*,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.e2e.ts,**/*.e2e.tsx,**/src/e2e/**/*

# Define test file patterns (still analyze them for other issues, just not duplication)
sonar.test.inclusions=**/__tests__/**/*,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.e2e.ts,**/*.e2e.tsx,**/src/e2e/**/*

# General project settings
sonar.sourceEncoding=UTF-8

# Exclude node_modules and other non-source directories
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/public/**,**/.swc/**

# Ignore rules on specific files
# S7637 (GitHub Actions : "use full commit SHA hash") : le repo épingle les
# actions par tag (@v4, @v5...) de façon homogène dans tous les workflows.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
