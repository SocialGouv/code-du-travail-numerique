# SonarCloud configuration

# Exclude test files from duplication detection
sonar.cpd.exclusions=**/__tests__/**/*,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.e2e.ts,**/*.e2e.tsx,**/src/e2e/**/*

# Define test file patterns (still analyze them for other issues, just not duplication)
sonar.test.inclusions=**/__tests__/**/*,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.e2e.ts,**/*.e2e.tsx,**/src/e2e/**/*

# General project settings
sonar.sourceEncoding=UTF-8

# Exclude non-source directories.
# .github/workflows/** : les actions sont épinglées par tag (@v4...) de façon
# homogène dans tout le repo ; on exclut les workflows de l'analyse pour éviter
# les hotspots S7637 ("use full commit SHA"). L'Automatic Analysis n'honorant
# pas les exclusions de règle par properties (sonar.issue.ignore.*), l'exclusion
# de fichier est le seul levier côté dépôt.
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/public/**,**/.swc/**,.github/workflows/**
