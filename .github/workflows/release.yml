name: Release

on: workflow_dispatch

concurrency:
  cancel-in-progress: true
  group: release-${{ github.ref }}

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App Token
        id: token
        uses: SocialGouv/token-bureau@main
        with:
          token-bureau-url: https://token-bureau.fabrique.social.gouv.fr
          audience: socialgouv
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Set git
        run: |
          git config --global user.name "${NAME}"
          git config --global user.email "${EMAIL}"
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          NAME: ${{ secrets.SOCIALGROOVYBOT_NAME }}
          EMAIL: ${{ secrets.SOCIALGROOVYBOT_EMAIL }}
      - name: Build for npm
        run: pnpm build:npm
      - name: Versionning code
        run: GH_TOKEN=${GITHUB_TOKEN} pnpm lerna version --force-publish --yes --conventional-commits --create-release github
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          # Skip husky pre-commit: parallel lint-staged races on .git/index.lock during the release commit
          HUSKY: 0
      - name: Rebase master to dev
        run: |
          git config --global user.name "${NAME}"
          git config --global user.email "${EMAIL}"
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git switch dev
          git pull
          git rebase master
          git push
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          NAME: ${{ secrets.SOCIALGROOVYBOT_NAME }}
          EMAIL: ${{ secrets.SOCIALGROOVYBOT_EMAIL }}
      - name: Deploy to npm
        # `lerna publish from-package` est idempotent : il interroge le registre
        # (packument) et ignore les versions déjà publiées.
        #
        # Avec le trusted publishing OIDC, npm génère la provenance : chaque paquet
        # est signé et une entrée est écrite dans le transparency log Sigstore/Rekor.
        # Le client sigstore rejoue son POST Rekor sur aléa réseau ; si l'entrée a
        # déjà été committée mais que la réponse s'est perdue, le POST rejoué reçoit
        # un 409 « an equivalent entry already exists ». Or sigstore code en dur
        # `fetchOnConflict: false` (vérifié de 4.0.0 à 5.0.0), donc ce 409 devient un
        # TLOG_CREATE_ENTRY_ERROR fatal au lieu d'être absorbé. Aucune montée de
        # version ne corrige ce comportement (lerna 9.0.x -> libnpmpublish 11.1.2
        # -> sigstore ^4, fetchOnConflict:false partout).
        #
        # Parade : on retente le publish. Chaque tentative re-signe avec une clé
        # éphémère neuve -> nouvelle entrée Rekor non conflictuelle. Grâce à
        # l'idempotence de from-package, seul le paquet en échec est republié.
        run: |
          set -uo pipefail
          attempt=0
          max_attempts=3
          until pnpm lerna publish from-package --yes; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Échec du publish npm après ${max_attempts} tentatives"
              exit 1
            fi
            echo "::warning::Tentative de publish npm ${attempt} en échec (probable 409 transparency log Sigstore/Rekor) ; nouvelle tentative dans 20s..."
            sleep 20
          done
      - name: Extract latest changelog section
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          TAG="$(git describe --tags --abbrev=0)"
          VERSION="${TAG#v}"
          VERSION="${VERSION##*@}"

          SECTION="$(awk -v ver="$VERSION" '
            # WARNING: do not use variable name `in` (reserved keyword in awk)
            $0 ~ "^##? \\["ver"\\]" {inside=1}
            inside && $0 ~ "^##? \\[" && $0 !~ "^##? \\["ver"\\]" {exit}
            inside {print}
          ' CHANGELOG.md)"

          if [ -z "$SECTION" ]; then
            SECTION="$(sed -n '1,120p' CHANGELOG.md)"
          fi

          SAFE_TAG="${TAG//\//_}"
          CHANGELOG_FILE="${RUNNER_TEMP}/changelog-${SAFE_TAG}.md"
          printf '%s\n' "$SECTION" > "$CHANGELOG_FILE"

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "changelog_file=$CHANGELOG_FILE"
            echo "changelog<<EOF"
            printf '%s\n' "$SECTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Mattermost payload (escape changelog)
        id: mm_payload
        if: success()
        shell: bash
        env:
          TAG: ${{ steps.changelog.outputs.tag }}
          CHANGELOG_FILE: ${{ steps.changelog.outputs.changelog_file }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          tag = os.environ["TAG"]
          actor = os.environ.get("ACTOR", "")
          run_url = os.environ.get("RUN_URL", "")
          changelog_path = Path(os.environ["CHANGELOG_FILE"])
          changelog = changelog_path.read_text(encoding="utf-8") if changelog_path.exists() else ""

          text = (
              f"# Nouvelle release du site principal (code.travail.gouv.fr) **{tag}** publiée.\n\n"
              f"[Workflow]({run_url})\n\n"
              f"\n{changelog.strip()}\n"
          )

          payload = {
              "username": actor,
              "text": text,
          }

          print(f"payload={json.dumps(payload)}")
          PY

      - name: Notify Mattermost - Release notes
        if: success()
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_RELEASE_URL }}
          PAYLOAD: ${{ steps.mm_payload.outputs.payload }}
