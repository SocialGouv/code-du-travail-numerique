name: Stats events wiki

# Synchronise le plan de tracking (events/TRACKING_PLAN.md, rédigé via le skill
# `/tracking-plan`) vers le wiki GitHub du dépôt, à chaque merge sur dev. Le
# métier consulte ainsi toujours la dernière version, sans intervention manuelle.
#
# La page n'est PAS écrasée : le helper `scripts/wiki-upsert.mjs` met à jour
# uniquement le bloc délimité par `<!-- TRACKING_PLAN:START/END -->`, préservant
# le titre et tout contenu manuel ajouté autour. Les liens "source" du markdown
# sont des URLs absolues, donc valides dans le wiki.

on:
  push:
    branches: [dev]
    paths:
      - packages/code-du-travail-stats/events/TRACKING_PLAN.md
      - .github/workflows/stats-events-wiki.yml
  workflow_dispatch:

concurrency:
  group: stats-events-wiki
  cancel-in-progress: true

env:
  # Le nom de fichier devient le titre de la page wiki : "Plan de tracking Matomo".
  WIKI_PAGE: Plan-de-tracking-Matomo.md
  # Titre H1 posé sur la page si elle doit être créée (bloc entre marqueurs).
  WIKI_TITLE: Plan de tracking Matomo
  SOURCE_DOC: packages/code-du-travail-stats/events/TRACKING_PLAN.md
  WIKI_UPSERT: packages/code-du-travail-stats/scripts/wiki-upsert.mjs

jobs:
  sync:
    name: Pousser TRACKING_PLAN.md vers le wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cloner le wiki
        # Préfère un PAT (secrets.WIKI_TOKEN) si la policy de l'org bloque le push
        # wiki via GITHUB_TOKEN ; sinon retombe sur le token de l'action.
        # Si le wiki n'a jamais été initialisé, le clone échoue : on amorce alors
        # un dépôt vierge avec la remote tokenisée pour que le push le crée.
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN || github.token }}
        run: |
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki || {
            echo "::warning::Wiki non clonable (probablement non initialisé) — tentative de création."
            mkdir wiki && cd wiki && git init -b master
            git remote add origin "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          }

      - name: Mettre à jour le bloc du plan de tracking (sans écraser la page)
        # `node` est préinstallé sur ubuntu-latest ; le helper n'a aucune
        # dépendance. Il remplace uniquement le bloc entre marqueurs et préserve
        # le reste de la page wiki.
        run: node "${WIKI_UPSERT}" "${SOURCE_DOC}" "wiki/${WIKI_PAGE}" "${WIKI_TITLE}"

      - name: Commit & push si la page a changé
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${WIKI_PAGE}"
          if git diff --cached --quiet; then
            echo "Wiki déjà à jour — rien à pousser."
            exit 0
          fi
          git commit -m "docs(tracking): synchronisation du plan de tracking (${GITHUB_SHA})"
          # -u origin HEAD : gère aussi le tout premier push (wiki fraîchement initialisé).
          git push -u origin HEAD
