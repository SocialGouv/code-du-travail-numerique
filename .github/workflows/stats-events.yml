name: Stats events

# Pipeline d'extraction des events Matomo :
#  - drift-check : échoue si `events.extracted.json` est désynchronisé du code
#      (régénérer via `events:extract`).
#  - unit-tests : tests unitaires des modules d'extraction (jest, sans services).
#
# Le plan de tracking métier (events/TRACKING_PLAN.md) n'est PLUS généré par un
# algo : il est rédigé via le skill Claude `/tracking-plan` (cf.
# .claude/skills/tracking-plan). Il n'est donc pas drift-checké ici.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: stats-events-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Drift check (JSON synchronisé avec le code)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --filter @socialgouv/cdtn-stats --frozen-lockfile
      - run: pnpm -F @socialgouv/cdtn-stats events:check

  unit-tests:
    name: Tests unitaires (extraction)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --filter @socialgouv/cdtn-stats --frozen-lockfile
      - run: pnpm -F @socialgouv/cdtn-stats test
