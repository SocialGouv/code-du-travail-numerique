name: Stats events

# Drift check : échoue si packages/stats/events/events.extracted.json est
# désynchronisé avec le code (event Matomo ajouté, supprimé ou modifié sans
# avoir régénéré le fichier via `pnpm -F @socialgouv/cdtn-stats events:extract`).

on:
  pull_request:
    paths:
      - "packages/stats/**"
      - "packages/code-du-travail-frontend/src/modules/**/*.ts"
      - "packages/code-du-travail-frontend/src/modules/**/*.tsx"
      - "packages/code-du-travail-modeles/src/publicodes/**/*.ts"
      - ".github/workflows/stats-events.yml"
  workflow_dispatch:

concurrency:
  group: stats-events-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Drift check (events.extracted.json synchronisé)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --filter @socialgouv/cdtn-stats --frozen-lockfile
      - run: pnpm -F @socialgouv/cdtn-stats events:check
