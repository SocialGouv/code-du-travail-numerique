name: Stats events

# Pipeline d'extraction des events Matomo :
#  - drift-check : échoue si un fichier généré est désynchronisé. Deux étapes dans le même job :
#      * events.extracted.json vs code     (régénérer via `events:extract`)
#      * events/TRACKING_PLAN.md vs JSON   (régénérer via `doc:generate`)
#  - unit-tests : tests unitaires des modules d'extraction (jest, sans services).

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: stats-events-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Drift check (JSON + markdown synchronisés)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --filter @socialgouv/cdtn-stats --frozen-lockfile
      - run: pnpm -F @socialgouv/cdtn-stats events:check
      - run: pnpm -F @socialgouv/cdtn-stats doc:check

  unit-tests:
    name: Tests unitaires (extraction)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --filter @socialgouv/cdtn-stats --frozen-lockfile
      - run: pnpm -F @socialgouv/cdtn-stats test
